<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!--
    Pulli kolam — corner ornament.
    A 5x5 dot grid with flowing curved petals around the centre.
    Drawn in faded antique-gold so it sits lightly behind content.
  -->
  <g stroke="#A87529" fill="none" opacity="0.28" stroke-linecap="round" stroke-linejoin="round">

    <!-- 4-petal lotus through centre -->
    <g stroke-width="1.2">
      <path d="M 100 60 Q 120 80 100 100 Q 80 80 100 60 Z"/>
      <path d="M 140 100 Q 120 120 100 100 Q 120 80 140 100 Z"/>
      <path d="M 100 140 Q 80 120 100 100 Q 120 120 100 140 Z"/>
      <path d="M 60 100 Q 80 80 100 100 Q 80 120 60 100 Z"/>
    </g>

    <!-- Outer flowing curves connecting outer dots -->
    <g stroke-width="1">
      <path d="M 40 100 Q 40 60 80 60"/>
      <path d="M 120 60 Q 160 60 160 100"/>
      <path d="M 160 100 Q 160 140 120 140"/>
      <path d="M 80 140 Q 40 140 40 100"/>
    </g>

    <!-- Concentric ring -->
    <circle cx="100" cy="100" r="55" stroke-width="0.6" stroke-dasharray="2 4"/>
    <circle cx="100" cy="100" r="14" stroke-width="0.8"/>
  </g>

  <!-- Pulli (dot grid) -->
  <g fill="#A87529" opacity="0.45">
    <circle cx="40"  cy="40"  r="1.5"/>
    <circle cx="70"  cy="40"  r="1.5"/>
    <circle cx="100" cy="40"  r="1.5"/>
    <circle cx="130" cy="40"  r="1.5"/>
    <circle cx="160" cy="40"  r="1.5"/>

    <circle cx="40"  cy="70"  r="1.5"/>
    <circle cx="70"  cy="70"  r="1.5"/>
    <circle cx="100" cy="70"  r="1.5"/>
    <circle cx="130" cy="70"  r="1.5"/>
    <circle cx="160" cy="70"  r="1.5"/>

    <circle cx="40"  cy="100" r="1.5"/>
    <circle cx="70"  cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="2.2"/>
    <circle cx="130" cy="100" r="1.5"/>
    <circle cx="160" cy="100" r="1.5"/>

    <circle cx="40"  cy="130" r="1.5"/>
    <circle cx="70"  cy="130" r="1.5"/>
    <circle cx="100" cy="130" r="1.5"/>
    <circle cx="130" cy="130" r="1.5"/>
    <circle cx="160" cy="130" r="1.5"/>

    <circle cx="40"  cy="160" r="1.5"/>
    <circle cx="70"  cy="160" r="1.5"/>
    <circle cx="100" cy="160" r="1.5"/>
    <circle cx="130" cy="160" r="1.5"/>
    <circle cx="160" cy="160" r="1.5"/>
  </g>
</svg>
