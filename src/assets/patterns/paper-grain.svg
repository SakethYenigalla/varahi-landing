<svg xmlns="http://www.w3.org/2000/svg" width="320" height="320" viewBox="0 0 320 320">
  <!--
    Handmade-paper grain. Two layers of fractal noise:
      • a coarse fibre layer for the "handmade" texture,
      • a fine grain on top for paper warmth.
    Rendered very subtly so it reads as texture, not noise.
  -->
  <defs>
    <filter id="fibre" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="3" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.62
                              0 0 0 0 0.50
                              0 0 0 0 0.30
                              0 0 0 0.07 0"/>
    </filter>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="2.4" numOctaves="2" seed="7" stitchTiles="stitch"/>
      <feColorMatrix values="0 0 0 0 0.45
                              0 0 0 0 0.32
                              0 0 0 0 0.18
                              0 0 0 0.05 0"/>
    </filter>
  </defs>

  <rect width="100%" height="100%" filter="url(#fibre)"/>
  <rect width="100%" height="100%" filter="url(#grain)"/>
</svg>
