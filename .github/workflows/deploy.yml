name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (with correct base-href)
        # If your repo is named differently, change /varahi-landing/ to /<repo-name>/
        run: npx ng build --configuration production --base-href "/${{ github.event.repository.name }}/"

      - name: Add 404.html (SPA fallback)
        run: cp dist/varahi-landing/browser/index.html dist/varahi-landing/browser/404.html

      - name: Add .nojekyll (so files starting with _ are served)
        run: touch dist/varahi-landing/browser/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/varahi-landing/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
